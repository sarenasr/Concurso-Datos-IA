datasets:
- id: gt2j-8ykr
  name: Casos positivos de COVID-19 en Colombia.
  permalink: https://www.datos.gov.co/d/gt2j-8ykr
  columns:
  - name: Código DIVIPOLA departamento
    field_name: departamento
    datatype: Number
    description: ''
  - name: Pertenencia étnica
    field_name: per_etn_
    datatype: Number
    description: '1-Indígena 2-ROM 3-Raizal 4-Palenquero 5-Negro 6-Otro. Esta variable
      se actualizará cada semana. ADVERTENCIA DE RESPONSABILIDAD: La variable etnia
      depende totalmente de tres cosas: - El correcto diligenciamiento de la variable
      Etnia por los profesionales de salud que notifican en más de 10.000 instituciones
      de salud en todos los municipios y departamentos. - Del autorreconocimiento
      de la persona cuando se le pregunta por esta variable. - Del listado censal
      que haga y mantenga actualizado cada departamento. No depende del Instituto
      Nacional de Salud, y por lo tanto, es responsabilidad de las autoridades de
      cada municipio, departamento y distrito de Colombia; la calidad y consistencia
      de dicha variable'
  - name: Nombre del país
    field_name: pais_viajo_1_nom
    datatype: Text
    description: ''
  - name: Código DIVIPOLA municipio
    field_name: ciudad_municipio
    datatype: Number
    description: ''
  - name: Nombre del grupo étnico
    field_name: nom_grupo_
    datatype: Text
    description: 'ADVERTENCIA DE RESPONSABILIDAD: La variable etnia depende totalmente
      de tres cosas: - El correcto diligenciamiento de la variable Etnia por los profesionales
      de salud que notifican en más de 10.000 instituciones de salud en todos los
      municipios y departamentos. - Del autorreconocimiento de la persona cuando se
      le pregunta por esta variable. - Del listado censal que haga y mantenga actualizado
      cada departamento. No depende del Instituto Nacional de Salud, y por lo tanto,
      es responsabilidad de las autoridades de cada municipio, departamento y distrito
      de Colombia; la calidad y consistencia de dicha variable'
  - name: Tipo de contagio
    field_name: fuente_tipo_contagio
    datatype: Text
    description: Relacionado Importado En estudio Comunitario
  - name: Nombre municipio
    field_name: ciudad_municipio_nom
    datatype: Text
    description: Por seguridad de las personas, algunos datos serán limitados evitando
      así la exposición y posible identificación en determinados municipios.
  - name: Fecha de recuperación
    field_name: fecha_recuperado
    datatype: Text
    description: ''
  - name: Sexo
    field_name: sexo
    datatype: Text
    description: ''
  - name: Fecha de inicio de síntomas
    field_name: fecha_inicio_sintomas
    datatype: Text
    description: Fecha de inicio de síntomas
  - name: Unidad de medida de edad
    field_name: unidad_medida
    datatype: Number
    description: 1-Años 2-Meses 3-Días
  - name: Nombre departamento
    field_name: departamento_nom
    datatype: Text
    description: Por seguridad de las personas, algunos datos serán limitados evitando
      así la exposición y posible identificación en determinados municipios.
  - name: Ubicación del caso
    field_name: ubicacion
    datatype: Text
    description: '* Corresponde a muertes no relacionadas con COVID-19, aún si eran
      casos activos **Hay pacientes recuperados para COVID-19, que pueden permanecer
      en hospitalización por otras comorbilidades'
  - name: Fecha de notificación
    field_name: fecha_de_notificaci_n
    datatype: Text
    description: Fecha de notificación a SIVIGILA
  - name: Código ISO del país
    field_name: pais_viajo_1_cod
    datatype: Number
    description: ''
  - name: Fecha de muerte
    field_name: fecha_muerte
    datatype: Text
    description: ''
  - name: Tipo de recuperación
    field_name: tipo_recuperacion
    datatype: Text
    description: 'Se refiere a la variable de tipo de recuperación que tiene dos opciones:
      PCR y tiempo. PCR indica que la persona se encuentra recuperada por segunda
      muestra, en donde dio negativo para el virus; mientras que tiempo significa
      que son personas que cumplieron 30 días posteriores al inicio de síntomas o
      toma de muestras que no tienen síntomas, que no tengan más de 70 años ni que
      estén hospitalizados. '
  - name: ID de caso
    field_name: id_de_caso
    datatype: Number
    description: ''
  - name: Fecha de diagnóstico
    field_name: fecha_diagnostico
    datatype: Text
    description: Fecha de confirmación por laboratorio
  - name: Recuperado
    field_name: recuperado
    datatype: Text
    description: Recuperado Fallecido N/A (Vacío). N/A se refiere a los fallecidos
      no COVID. Pueden haber casos recuperados con ubicación Hospital u Hospital UCI,
      ya que permanecen en hospitalización por causas diferentes. Los casos con información
      en blanco en esta columna corresponde a los casos activos
  - name: Estado
    field_name: estado
    datatype: Text
    description: '* Corresponde a muertes no relacionadas con COVID-19, aún si eran
      casos activos **Hay pacientes recuperados para COVID-19, que pueden permanecer
